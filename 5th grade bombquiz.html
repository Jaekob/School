<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOOM! Quiz - Roulette</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-yellow:  #ffd93d;
            --accent-red:     #ff6b6b;
            --accent-blue:    #4dabf7;
            --accent-pink:    #f783ac;
            --accent-purple:  #9775fa;
            --accent-orange:  #ff922b;
            --accent-green:   #51cf66;
            --text-dark:      #0a0a1a;
            --text-light:     #e8eaf6;
            --card-bg:        rgba(12, 10, 35, 0.88);
            --card-border:    rgba(150, 120, 255, 0.3);
            --card-shadow:    0 8px 32px rgba(0,0,0,0.7);
            --footer-height:  clamp(62px, 12vh, 90px);
            --font-display:   'Orbitron', monospace;
            --font-body:      'Exo 2', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; touch-action: manipulation; }

        body {
            font-family: var(--font-body);
            background: #03020f;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
        }

        /* ── STAR CANVAS ── */
        #stars-canvas {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }

        /* ── ANIMATED NEBULA ── */
        #nebula {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            animation: nebulaDrift 18s ease-in-out infinite alternate;
        }
        #nebula::before, #nebula::after { content: ''; position: absolute; inset: 0; border-radius: 50%; }
        #nebula::before {
            background:
                radial-gradient(ellipse 65% 45% at 18% 28%, rgba(110,50,220,0.22) 0%, transparent 65%),
                radial-gradient(ellipse 55% 40% at 82% 72%, rgba(30,110,210,0.18) 0%, transparent 65%);
            animation: nebulaRotate 30s linear infinite;
        }
        #nebula::after {
            background:
                radial-gradient(ellipse 45% 35% at 60% 12%, rgba(220,50,110,0.13) 0%, transparent 65%),
                radial-gradient(ellipse 35% 30% at 35% 80%, rgba(50,200,180,0.10) 0%, transparent 65%);
            animation: nebulaRotate 45s linear infinite reverse;
        }
        @keyframes nebulaDrift {
            0%   { transform: scale(1)    rotate(0deg); }
            100% { transform: scale(1.08) rotate(3deg); }
        }
        @keyframes nebulaRotate {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* ── START SCREEN ── */
        #start-screen {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, #16083a 0%, #03020f 70%);
            transition: opacity 0.8s ease, transform 0.8s ease;
            padding: 20px;
        }
        #start-screen.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }

        .start-title {
            font-family: var(--font-display);
            font-size: clamp(2rem, 9vw, 5rem);
            font-weight: 900;
            color: var(--text-light);
            text-shadow: 0 0 20px var(--accent-purple), 0 0 60px var(--accent-purple), 4px 4px 0 var(--accent-red);
            margin-bottom: 8px;
            animation: titleBounce 1.2s ease-in-out infinite, titleGlow 2s ease-in-out infinite alternate;
            letter-spacing: 0.05em;
        }
        @keyframes titleGlow {
            from { text-shadow: 0 0 20px var(--accent-purple), 4px 4px 0 var(--accent-red); }
            to   { text-shadow: 0 0 45px var(--accent-blue), 0 0 90px var(--accent-purple), 4px 4px 0 var(--accent-red); }
        }
        @keyframes titleBounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }

        .start-subtitle {
            font-size: clamp(0.8rem, 2.8vw, 1.2rem);
            color: var(--accent-blue);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 12px;
            opacity: 0.85;
            font-weight: 600;
        }
        .start-planets {
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 30px;
            animation: orbit 4s ease-in-out infinite;
            display: block;
        }
        @keyframes orbit { 0%,100%{transform:translateY(0) rotate(-5deg);} 50%{transform:translateY(-12px) rotate(5deg);} }

        .start-btn {
            padding: 16px 55px;
            font-size: clamp(1.1rem, 3.5vw, 1.6rem);
            font-family: var(--font-display);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-purple), #5a3fc0);
            color: white;
            border: 2px solid rgba(200,160,255,0.5);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(150,100,255,0.6), 0 8px 0 #3a2080;
            transition: all 0.15s ease;
            animation: btnPulse 2.2s ease-in-out infinite;
            letter-spacing: 0.08em;
        }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 0 55px rgba(150,100,255,0.9), 0 11px 0 #3a2080; }
        @keyframes btnPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }

        /* ── SETUP SCREEN ── */
        #setup-screen {
            position: fixed; inset: 0; z-index: 900;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(3,2,15,0.9); backdrop-filter: blur(14px);
            padding: 20px;
        }
        #setup-screen.active { display: flex; }
        .setup-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: clamp(25px,6vw,50px);
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--card-shadow), 0 0 70px rgba(100,60,200,0.35);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp { from{transform:translateY(40px);opacity:0;} to{transform:translateY(0);opacity:1;} }
        .setup-title {
            font-family: var(--font-display);
            font-size: clamp(1.2rem,3.5vw,1.7rem);
            color: var(--accent-yellow);
            margin-bottom: 18px;
            letter-spacing: 0.05em;
        }
        .setup-input {
            width: clamp(80px,18vw,110px);
            font-size: clamp(1.4rem,4vw,1.9rem);
            padding: 10px; text-align: center;
            border: 2px solid var(--accent-purple);
            border-radius: 12px; margin-bottom: 18px;
            background: rgba(255,255,255,0.07); color: white;
        }
        .setup-btn {
            padding: 13px 45px;
            font-size: clamp(1rem,3vw,1.3rem);
            font-family: var(--font-display);
            font-weight: 700;
            background: linear-gradient(135deg,var(--accent-purple),#5a3fc0);
            color: white; border: none; border-radius: 28px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(150,100,255,0.4);
            transition: all 0.2s;
            letter-spacing: 0.06em;
        }
        .setup-btn:hover { transform: scale(1.08); box-shadow: 0 0 40px rgba(150,100,255,0.7); }

        /* ── GAME LAYOUT ── */
        #game-container {
            position: relative; z-index: 1;
            flex: 1; display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
            padding-bottom: var(--footer-height);
        }
        #header {
            background: linear-gradient(135deg, rgba(80,30,150,0.92), rgba(30,15,90,0.96));
            border-bottom: 1px solid rgba(150,100,255,0.35);
            padding: clamp(6px,1.5vw,12px) clamp(12px,3vw,25px);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            flex-shrink: 0;
        }
        .team-badge {
            font-family: var(--font-display);
            background: linear-gradient(135deg, var(--accent-yellow), #f59f00);
            color: #1a0a00;
            padding: clamp(6px,1.5vw,12px) clamp(18px,4vw,35px);
            border-radius: 40px;
            font-size: clamp(0.9rem,3vw,1.5rem);
            font-weight: 700;
            box-shadow: 0 0 22px rgba(255,217,61,0.5), 0 4px 0 #a06000;
            animation: badgePop 0.3s ease, badgePulse 2s ease-in-out infinite;
            letter-spacing: 0.04em;
        }
        @keyframes badgePop   { 0%{transform:scale(0.5);} 60%{transform:scale(1.1);} 100%{transform:scale(1);} }
        @keyframes badgePulse { 0%,100%{box-shadow:0 0 20px rgba(255,217,61,0.5),0 4px 0 #a06000;} 50%{box-shadow:0 0 38px rgba(255,217,61,0.85),0 4px 0 #a06000;} }

        /* ── QUESTION CARD ── */
        #prompt-box {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            color: var(--text-light);
            padding: clamp(12px,3vw,24px) clamp(16px,4vw,32px);
            border-radius: 20px;
            font-size: clamp(1rem,3.2vw,2rem);
            text-align: center;
            box-shadow: var(--card-shadow), 0 0 30px rgba(150,100,255,0.2);
            max-width: 95%; flex-shrink: 0;
            transition: all 0.4s ease;
            font-weight: 600;
        }
        #prompt-box.glow { animation: cardGlow 1.5s ease-in-out infinite; }
        @keyframes cardGlow {
            0%,100%{ box-shadow: var(--card-shadow), 0 0 20px rgba(150,100,255,0.2); }
            50%    { box-shadow: var(--card-shadow), 0 0 45px rgba(150,100,255,0.55); }
        }
        #prompt-box.hidden-phase {
            transform: scale(0.4) rotate(-10deg);
            opacity: 0; pointer-events: none;
            max-height: 0; padding: 0; margin: 0; border: none;
        }
        @keyframes fadeIn { from{transform:scale(0.85);opacity:0;} to{transform:scale(1);opacity:1;} }

        /* ── CONTROLS ── */
        #controls { display: flex; gap: clamp(10px,2.5vw,20px); flex-shrink: 0; }
        .btn {
            padding: clamp(10px,2.5vw,16px) clamp(22px,5vw,40px);
            font-size: clamp(0.9rem,2.5vw,1.4rem);
            font-family: var(--font-display);
            font-weight: 700;
            border: none; border-radius: 16px;
            cursor: pointer; transition: all 0.2s ease;
            position: relative; letter-spacing: 0.05em;
        }
        .btn:active { transform: translateY(3px); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
        .btn-green { background: linear-gradient(135deg,#51cf66,#40c057); color: white; box-shadow: 0 5px 0 #2f9e44, 0 0 20px rgba(80,200,100,0.4); }
        .btn-red   { background: linear-gradient(135deg,#ff6b6b,#fa5252); color: white; box-shadow: 0 5px 0 #c92a2a, 0 0 20px rgba(255,100,100,0.3); }

        /* ── ROULETTE AREA ── */
        #roulette-area {
            display: none; flex-direction: column;
            align-items: center; gap: clamp(6px,1.5vw,10px);
            width: 100%; flex: 1; min-height: 0; justify-content: center;
        }
        #roulette-area.active { display: flex; }

        /* ── WHEEL + LEGEND ── */
        #wheel-and-legend {
            display: flex; align-items: center;
            gap: clamp(10px,2.5vw,20px);
            justify-content: center; flex-shrink: 0;
        }
        #wheel-container {
            position: relative;
            width: clamp(140px,38vw,240px);
            height: clamp(140px,38vw,240px);
            flex-shrink: 0;
        }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            box-shadow:
                0 0 0 5px rgba(255,255,255,0.12),
                0 0 0 8px rgba(150,100,255,0.5),
                0 0 50px rgba(150,100,255,0.4),
                var(--card-shadow);
            transition: transform 3.2s cubic-bezier(0.2,0.7,0.2,1);
            position: relative;
        }
        /* Hub cap */
        #wheel::before {
            content: '';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 18%; height: 18%;
            background: radial-gradient(circle, #fff, #c0a0ff);
            border-radius: 50%;
            box-shadow: 0 0 18px rgba(200,160,255,0.9);
            z-index: 10;
        }
        /* Tick overlay */
        #wheel::after {
            content: '';
            position: absolute; inset: 0; border-radius: 50%;
            pointer-events: none;
            background: repeating-conic-gradient(
                rgba(255,255,255,0.22) 0deg 2deg,
                transparent 2deg 12deg
            );
            mix-blend-mode: overlay;
        }
        /* Spinning glow ring — activates via JS class */
        #wheel.spinning {
            box-shadow:
                0 0 0 5px rgba(255,255,255,0.18),
                0 0 0 8px rgba(255,180,50,0.7),
                0 0 70px rgba(255,180,50,0.5),
                var(--card-shadow);
        }

        #pointer {
            position: absolute; top: -22px; left: 50%;
            transform: translateX(-50%); z-index: 20;
            width: 0; height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 30px solid #ff4466;
            filter: drop-shadow(0 0 7px rgba(255,50,100,0.9));
        }
        /* Pointer bounce on tick — toggled via JS */
        #pointer.tick { animation: pointerTick 0.06s ease; }
        @keyframes pointerTick {
            0%   { transform: translateX(-50%) rotate(0deg); }
            50%  { transform: translateX(-50%) rotate(-8deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        #bomb-visual {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%) scale(var(--bomb-scale,1));
            width: 22%; height: 22%; z-index: 20;
            transition: transform 0.5s ease; pointer-events: none;
            font-size: clamp(1.5rem,6vw,3rem); text-align: center; line-height: 100%;
        }
        #bomb-visual::before {
            content: '💣';
            display: block;
            animation: bombFloat 2s ease-in-out infinite;
        }
        #bomb-visual.pulse::before { animation: bombFloat 2s ease-in-out infinite, bombPulseAnim 0.8s ease-in-out infinite; }
        @keyframes bombPulseAnim { 0%,100%{filter:brightness(1);} 50%{filter:brightness(2.2) drop-shadow(0 0 10px orange);} }
        @keyframes bombFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }
        #bomb-visual.growing::before { animation: bombGrow 0.5s ease; }
        @keyframes bombGrow { 0%,100%{filter:brightness(1);} 50%{filter:brightness(2.5) drop-shadow(0 0 14px orange);} }

        /* ── WHEEL LEGEND ── */
        #wheel-legend {
            display: flex; flex-direction: column; gap: 4px;
            background: var(--card-bg); border: 1px solid var(--card-border);
            padding: clamp(8px,2vw,12px); border-radius: 12px;
            box-shadow: var(--card-shadow); min-width: 88px;
        }
        .legend-item {
            display: flex; align-items: center; gap: 6px;
            font-size: clamp(0.6rem,1.8vw,0.8rem);
            font-weight: 700; color: var(--text-light); white-space: nowrap;
            font-family: var(--font-body);
        }
        .legend-swatch {
            width: 12px; height: 12px; border-radius: 3px;
            flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2);
        }
        .legend-pct { color: rgba(200,200,255,0.6); font-weight: 400; font-size: 0.85em; }

        /* Legend row flashes on hit */
        .legend-item.legend-flash {
            animation: legendFlash 0.9s ease forwards;
        }
        @keyframes legendFlash {
            0%   { background: rgba(255,255,255,0.0); }
            20%  { background: rgba(255,255,255,0.25); border-radius: 6px; }
            100% { background: rgba(255,255,255,0.0); }
        }

        /* Wheel shimmer on land */
        #wheel.land-flash::after {
            animation: landShimmer 0.6s ease forwards !important;
        }
        @keyframes landShimmer {
            0%   { opacity: 0; box-shadow: inset 0 0 0px rgba(255,255,255,0); }
            40%  { opacity: 1; filter: brightness(2); }
            100% { opacity: 1; filter: brightness(1); }
        }

        /* Rare chance indicator in legend */
        #rare-chance-row {
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(255,150,50,0.25);
        }
        #rare-chance-row .legend-pct { color: rgba(255,165,80,0.75); }

        /* ── POWERUP BANNER ── */
        #powerup-banner {
            display: none; align-items: center; justify-content: center; gap: 8px;
            background: linear-gradient(135deg,rgba(150,100,255,0.25),rgba(80,40,160,0.38));
            border: 2px solid rgba(180,140,255,0.65); border-radius: 14px;
            padding: clamp(7px,2vw,11px) clamp(14px,3vw,22px);
            font-size: clamp(0.82rem,2.3vw,1.05rem);
            font-weight: 700; color: var(--accent-yellow);
            box-shadow: 0 0 22px rgba(150,100,255,0.45);
            animation: powerupPulse 1.5s ease-in-out infinite;
            flex-shrink: 0;
        }
        #powerup-banner.active { display: flex; }
        @keyframes powerupPulse {
            0%,100%{ box-shadow: 0 0 15px rgba(150,100,255,0.35); }
            50%    { box-shadow: 0 0 35px rgba(150,100,255,0.75); }
        }

        /* ── TARGET SELECTION ── */
        #target-selection {
            display: none; background: var(--card-bg);
            border: 1px solid rgba(255,100,100,0.45);
            padding: clamp(8px,2vw,14px); border-radius: 14px;
            box-shadow: var(--card-shadow);
            width: 100%; max-width: 340px; flex-shrink: 0;
        }
        #target-selection.active { display: block; }
        .target-title {
            font-size: clamp(0.78rem,2.3vw,0.95rem);
            color: var(--accent-red); font-weight: 700;
            margin-bottom: 8px; text-align: center;
        }
        .target-options { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .target-btn {
            padding: clamp(6px,1.5vw,10px) clamp(12px,3vw,18px);
            font-size: clamp(0.72rem,2vw,0.92rem);
            border: 2px solid var(--accent-red);
            background: rgba(255,100,100,0.1);
            color: var(--accent-red); border-radius: 10px;
            cursor: pointer; font-weight: 700; transition: all 0.2s;
        }
        .target-btn:hover, .target-btn.selected { background: var(--accent-red); color: white; }

        /* ── SPIN ROW ── */
        #spin-row { display: flex; align-items: center; gap: clamp(10px,2.5vw,18px); flex-shrink: 0; }
        #spin-btn {
            padding: clamp(10px,2.5vw,16px) clamp(28px,7vw,55px);
            font-size: clamp(1.1rem,3.5vw,1.8rem);
            font-family: var(--font-display);
            font-weight: 700; letter-spacing: 0.06em;
            background: linear-gradient(135deg,var(--accent-yellow),#f59f00);
            color: #1a0a00; border: none; border-radius: 45px;
            cursor: pointer;
            box-shadow: 0 0 28px rgba(255,210,50,0.55), 0 6px 0 #a06000;
            transition: all 0.15s ease;
        }
        #spin-btn:hover  { transform: translateY(-3px); box-shadow: 0 0 50px rgba(255,210,50,0.85), 0 9px 0 #a06000; }
        #spin-btn:active { transform: translateY(3px);  box-shadow: 0 0 15px rgba(255,210,50,0.4),  0 3px 0 #a06000; }
        #spin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ── POT ── */
        .pot-display { display: flex; align-items: center; gap: clamp(8px,2vw,14px); flex-shrink: 0; }
        .pot-label { font-size: clamp(0.85rem,2.5vw,1.2rem); color: rgba(200,200,255,0.7); }
        .pot-value {
            font-family: var(--font-display);
            font-size: clamp(1.8rem,5vw,3rem);
            color: var(--accent-yellow); font-weight: 700;
            text-shadow: 0 0 18px rgba(255,210,50,0.65);
            transition: transform 0.2s ease;
        }
        .pot-value.bump { animation: potBump 0.3s ease; }
        @keyframes potBump { 0%,100%{transform:scale(1);} 50%{transform:scale(1.35);} }
        .bank-btn {
            padding: clamp(8px,2vw,12px) clamp(16px,4vw,28px);
            font-size: clamp(0.82rem,2.3vw,1.1rem);
            font-family: var(--font-display); font-weight: 700; letter-spacing: 0.05em;
            background: linear-gradient(135deg,#4dabf7,#339af0);
            color: white; border: none; border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(80,170,255,0.45), 0 4px 0 #1971c2;
        }
        .bank-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1971c2; }
        .bank-btn.hidden { display: none; }

        /* ── RESULT OVERLAY ── */
        #result-overlay {
            position: fixed; inset: 0; background: rgba(3,2,15,0.92);
            display: none; align-items: center; justify-content: center;
            z-index: 600; flex-direction: column; gap: 20px;
            backdrop-filter: blur(10px);
        }
        #result-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        .result-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            padding: clamp(25px,7vw,55px); border-radius: 28px; text-align: center;
            animation: resultPop 0.5s ease;
            box-shadow: var(--card-shadow), 0 0 65px rgba(100,60,200,0.45);
            max-width: 90%;
        }
        @keyframes resultPop {
            0%  { transform: scale(0) rotate(-20deg); }
            60% { transform: scale(1.1) rotate(5deg); }
            100%{ transform: scale(1) rotate(0deg); }
        }
        .result-icon  { font-size: clamp(3.5rem,13vw,7rem); margin-bottom: 10px; animation: iconBounce 0.6s ease infinite; }
        @keyframes iconBounce { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
        .result-title { font-size: clamp(1.4rem,5vw,2.8rem); font-weight: 700; margin-bottom: 14px; color: var(--text-light); font-family: var(--font-display); }
        .result-teams { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .result-team  { background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); padding: 14px 22px; border-radius: 14px; text-align: center; }

<script>
/* ═══════════════════════════════════════════════════════
   STAR BACKGROUND
   - 200 twinkle stars
   - shooting stars every 3.5s
   - colour-tinted stars (blue/white/lavender mix)
═══════════════════════════════════════════════════════ */
(function initStars() {
    const canvas = document.getElementById('stars-canvas');
    const ctx    = canvas.getContext('2d');
    const STAR_COLORS = ['220,220,255', '200,220,255', '255,240,220', '210,200,255'];
    let stars = [], shootingStars = [], W, H;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        stars = Array.from({ length: 200 }, () => ({
            x:            Math.random() * W,
            y:            Math.random() * H,
            r:            Math.random() * 1.7 + 0.2,
            alpha:        Math.random() * 0.7 + 0.3,
            speed:        Math.random() * 0.5 + 0.08,
            twinklePhase: Math.random() * Math.PI * 2,
            color:        STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)]
        }));
    }

    function spawnShootingStar() {
        shootingStars.push({
            x:     Math.random() * W * 0.7,
            y:     Math.random() * H * 0.4,
            len:   Math.random() * 120 + 60,
            speed: Math.random() * 9 + 6,
            alpha: 1,
            angle: Math.PI / 4 + (Math.random() - 0.5) * 0.35
        });
    }
    setInterval(spawnShootingStar, 3500);

    let t = 0;
    function draw() {
        ctx.clearRect(0, 0, W, H);
        t += 0.013;

        stars.forEach(s => {
            const a = s.alpha * (0.55 + 0.45 * Math.sin(t * s.speed + s.twinklePhase));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${s.color},${a})`;
            ctx.fill();
        });

        shootingStars = shootingStars.filter(s => s.alpha > 0);
        shootingStars.forEach(s => {
            const tail = ctx.createLinearGradient(
                s.x, s.y,
                s.x - Math.cos(s.angle) * s.len,
                s.y - Math.sin(s.angle) * s.len
            );
            tail.addColorStop(0, `rgba(255,255,255,${s.alpha})`);
            tail.addColorStop(0.4, `rgba(180,180,255,${s.alpha * 0.5})`);
            tail.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x - Math.cos(s.angle) * s.len, s.y - Math.sin(s.angle) * s.len);
            ctx.strokeStyle = tail;
            ctx.lineWidth = 2;
            ctx.stroke();
            s.x     += Math.cos(s.angle) * s.speed;
            s.y     += Math.sin(s.angle) * s.speed;
            s.alpha -= 0.016;
        });

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
})();

/* ═══════════════════════════════════════════════════════
   AUDIO  ─  single unified sound engine
   sound({ freq, type, dur, vol, env })
   Presets available via SOUNDS map.
═══════════════════════════════════════════════════════ */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/**
 * Play one oscillator tone.
 * @param {object} opts
 *   freq  {number}  Hz            default 440
 *   type  {string}  OscillatorType default 'sine'
 *   dur   {number}  seconds        default 0.1
 *   vol   {number}  0-1            default 0.08
 *   attack  {number} seconds       default 0.005
 *   release {number} seconds       default dur * 0.4
 */
function sound({ freq = 440, type = 'sine', dur = 0.1, vol = 0.08, attack = 0.005, release } = {}) {
    const rel = release ?? dur * 0.4;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const now  = audioCtx.currentTime;

    osc.type = type;
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + attack);
    gain.gain.setValueAtTime(vol, now + dur - rel);
    gain.gain.linearRampToValueAtTime(0, now + dur);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + dur);
}

/** Convenience presets */
const SOUNDS = {
    tick:    () => sound({ freq: 1050, type: 'square', dur: 0.03, vol: 0.04 }),
    correct: () => sound({ freq: 700,  type: 'triangle', dur: 0.14, vol: 0.09 }),
    point:   (pts) => sound({ freq: 500 + pts * 80, type: 'sine', dur: 0.18, vol: 0.1 }),
    bomb:    () => {
        sound({ freq: 80, type: 'sawtooth', dur: 0.6, vol: 0.12 });
        setTimeout(() => sound({ freq: 55, type: 'square', dur: 0.4, vol: 0.08 }), 80);
    },
    rare:    () => {
        [600, 750, 950].forEach((f, i) => setTimeout(() => sound({ freq: f, type: 'sine', dur: 0.25, vol: 0.09 }), i * 90));
    },
    bank:    () => {
        [440, 550, 660].forEach((f, i) => setTimeout(() => sound({ freq: f, type: 'triangle', dur: 0.2, vol: 0.09 }), i * 80));
    },
    victory: () => {
        [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => sound({ freq: f, type: 'sine', dur: 0.28, vol: 0.09 }), i * 120));
    }
};

/* ═══════════════════════════════════════════════════════
   TICKING — exponential slow-down
═══════════════════════════════════════════════════════ */
let ticking = false;

function startTicking(spinDurMs = 3200) {
    ticking = true;
    const startTime = performance.now();
    const minDelay  = 35;
    const maxDelay  = 280;

    function tickLoop() {
        if (!ticking) return;
        SOUNDS.tick();
        triggerPointerBounce();

        const elapsed = performance.now() - startTime;
        const progress = Math.min(elapsed / spinDurMs, 1);        // 0→1
        const delay = minDelay + (maxDelay - minDelay) * (progress ** 2.2); // expo
        setTimeout(tickLoop, delay);
    }
    tickLoop();
}

function stopTicking() { ticking = false; }

function triggerPointerBounce() {
    const p = document.getElementById('pointer');
    p.classList.remove('tick');
    void p.offsetWidth;          // reflow
    p.classList.add('tick');
    setTimeout(() => p.classList.remove('tick'), 80);
}

/* ═══════════════════════════════════════════════════════
   QUESTION QUEUE
═══════════════════════════════════════════════════════ */
function shuffleArray(arr) {
    const s = [...arr];
    for (let i = s.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [s[i], s[j]] = [s[j], s[i]];
    }
    return s;
}

function initQuestionQueue() {
    questionQueue     = shuffleArray(QUESTIONS);
    questionsAnswered = 0;
}

function getNextQuestion() {
    if (!questionQueue.length) questionQueue = shuffleArray(QUESTIONS);
    return questionQueue.pop();
}

function advanceQuestion() {
    questionsAnswered++;
    updateProgressBar();
    const q   = getNextQuestion();
    const box = document.getElementById('prompt-box');
    box.classList.remove('hidden-phase');
    box.classList.add('glow');
    box.innerText       = q;
    box.style.animation = 'none';
    setTimeout(() => { box.style.animation = 'fadeIn 0.5s ease'; }, 10);
}

function updateProgressBar() {
    const pct = ((questionsAnswered % totalQuestions) / totalQuestions) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
}

/* ═══════════════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════════════ */
let gameState = {
    teams:              [],
    activeIndex:        0,
    pot:                0,
    roundActive:        false,
    spinLocked:         false,
    bombChance:         0,      // resets each team turn; grows +10% per point
    rareChancePct:      5,      // resets each team turn; grows +5% per spin
    extraBombs:         0,      // planted bombs add extra bomb slices this turn
    activeRare:         null,
    rareOnWheel:        false,
    targetTeamIdx:      null,
    pendingBombTargets: {},
    shielded:           {},
    gameEnded:          false
};

/* ═══════════════════════════════════════════════════════
   WHEEL BUILDER
   buildSlices(bombChancePct) → pure slice array, no DOM
   applyWheelDisplay(slices, bombChancePct) → DOM update
   buildWheelGradient(pct) → both (backward-compat shorthand)
═══════════════════════════════════════════════════════ */
function buildSlices(bombChancePct) {
    const hasRare     = gameState.rareOnWheel;
    const rarePct     = hasRare ? (gameState.rareChancePct ?? 5) : 0;
    const extraBombPct= gameState.extraBombs ? 20 : 0; // planted bomb = extra 20% slice
    const totalBombPct= Math.min(90, bombChancePct + extraBombPct);

    // Points segments fill remaining degrees after bomb + rare
    const pointSegs   = WHEEL_SEGMENTS.filter(s => s.type === 'points');
    const pointTotal  = pointSegs.reduce((s, x) => s + x.baseCount, 0);
    const usedPct     = totalBombPct + rarePct;
    const pointDeg    = 360 * Math.max(0, (100 - usedPct) / 100);
    const rareDeg     = 360 * (rarePct / 100);
    const bombDeg     = 360 * (bombChancePct / 100);
    const extraBombDeg= 360 * (extraBombPct / 100);

    const slices = [];
    let cursor = 0;

    pointSegs.forEach(seg => {
        const deg = pointDeg * (seg.baseCount / pointTotal);
        slices.push({ ...seg, start: cursor, end: cursor + deg });
        cursor += deg;
    });

    if (hasRare && rareDeg > 0) {
        const rareSeg = WHEEL_SEGMENTS.find(s => s.type === 'rare');
        slices.push({ ...rareSeg, start: cursor, end: cursor + rareDeg });
        cursor += rareDeg;
    }

    if (bombDeg > 0) {
        slices.push({ type: 'bomb', color: '#9775fa', label: '💣 BOMB', start: cursor, end: cursor + bombDeg });
        cursor += bombDeg;
    }

    if (extraBombDeg > 0) {
        slices.push({ type: 'bomb', color: '#c040ff', label: '💣 PLANTED', start: cursor, end: cursor + extraBombDeg });
        cursor += extraBombDeg;
    }

    return slices;
}

function applyWheelDisplay(slices, bombChancePct) {
    const stops = slices.map(s => `${s.color} ${s.start.toFixed(2)}deg ${s.end.toFixed(2)}deg`).join(', ');
    document.getElementById('wheel').style.background = `conic-gradient(${stops})`;

    const nonBomb = slices.filter(s => s.type !== 'bomb');
    const total   = nonBomb.reduce((s, x) => s + x.baseCount, 0);
    const legendEl = document.getElementById('wheel-legend');
    legendEl.innerHTML = '';
    nonBomb.forEach(seg => {
        const pct  = Math.round((seg.baseCount / total) * (100 - bombChancePct));
        const item = document.createElement('div');
        item.className   = 'legend-item';
        item.dataset.type = seg.type;
        item.innerHTML   = `<span class="legend-swatch" style="background:${seg.color}"></span>${seg.label} <span class="legend-pct">${pct}%</span>`;
        legendEl.appendChild(item);
    });
    const bombItem = document.createElement('div');
    bombItem.className    = 'legend-item';
    bombItem.dataset.type = 'bomb';
    bombItem.innerHTML    = `<span class="legend-swatch" style="background:#9775fa"></span>💣 BOMB <span class="legend-pct">${bombChancePct}%</span>`;
    legendEl.appendChild(bombItem);

}

function buildWheelGradient(bombChancePct) {
    const slices = buildSlices(bombChancePct);
    applyWheelDisplay(slices, bombChancePct);
    return slices;
}

/** Flash the matching legend row after a spin lands */
function flashLegendHit(hitType) {
    document.querySelectorAll('#wheel-legend .legend-item').forEach(el => {
        if (el.dataset.type === hitType) {
            el.classList.add('legend-flash');
            setTimeout(() => el.classList.remove('legend-flash'), 900);
        }
    });
}

/* ═══════════════════════════════════════════════════════
   SCREEN MANAGEMENT
═══════════════════════════════════════════════════════ */
function showSetup() {
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('setup-screen').classList.add('active');
}

function startGame() {
    const teamCount = parseInt(document.getElementById('team-input').value) || 4;
    gameState.teams = Array.from({ length: teamCount }, (_, i) => ({ name: `Team ${i + 1}`, score: 0 }));
    document.getElementById('setup-screen').classList.remove('active');
    Object.assign(gameState, {
        activeIndex: 0, pot: 0, roundActive: false, spinLocked: false,
        bombChance: 0, rareChancePct: 5, extraBombs: 0, activeRare: null, rareOnWheel: false,
        targetTeamIdx: null, pendingBombTargets: {}, shielded: {}, gameEnded: false
    });
    initQuestionQueue();
    buildWheelGradient(0);
    renderFooter();
    updateUI();
    advanceQuestion();
}

/* ═══════════════════════════════════════════════════════
   UI UPDATES
═══════════════════════════════════════════════════════ */
function updateUI() {
    const team = gameState.teams[gameState.activeIndex];
    document.getElementById('cur-name').innerText   = `🚀 ${team.name}`;
    document.getElementById('pot-display').innerText = gameState.pot;
    updateBombVisual(true);
    renderFooter();
    updateTargetSelection();
}

function updateBombVisual(redraw = true) {
    if (redraw) buildWheelGradient(gameState.bombChance);
    const bombVisual = document.getElementById('bomb-visual');
    const scale      = 0.7 + (gameState.bombChance / 100) * 0.8;
    bombVisual.style.setProperty('--bomb-scale', scale);
    bombVisual.classList.toggle('pulse', gameState.bombChance > 50);
}

function renderFooter() {
    document.getElementById('footer').innerHTML = gameState.teams.map((team, i) => {
        const isActive   = i === gameState.activeIndex;
        const isTargeted = gameState.pendingBombTargets[i] !== undefined;
        const isShielded = gameState.shielded[i];
        const badge      = isTargeted ? ' 💣' : isShielded ? ' 🛡️' : '';
        return `<div class="team-tab ${isActive ? 'active' : ''} ${isTargeted ? 'targeted' : ''}" onclick="manualScore(${i})">
            <div class="tab-name">${team.name}${badge}</div>
            <div class="tab-score" id="score-${i}">${team.score}</div>
        </div>`;
    }).join('');
}

function updateTargetSelection() {
    const section   = document.getElementById('target-selection');
    const container = document.getElementById('target-options');
    const needsTarget = gameState.rareOnWheel && gameState.activeRare?.needsTarget;

    if (!needsTarget) { section.classList.remove('active'); return; }
    section.classList.add('active');
    container.innerHTML = gameState.teams
        .map((team, i) => i !== gameState.activeIndex
            ? `<button class="target-btn ${gameState.targetTeamIdx === i ? 'selected' : ''}"
                       onclick="selectTarget(${i})" ${gameState.spinLocked ? 'disabled' : ''}>
                ${team.name}
               </button>`
            : '')
        .join('');
}

function selectTarget(idx) {
    if (gameState.spinLocked) return;
    gameState.targetTeamIdx = idx;
    updateTargetSelection();
}

/* ═══════════════════════════════════════════════════════
   GAME LOGIC
═══════════════════════════════════════════════════════ */
function revealRoulette() {
    if (gameState.roundActive) return;
    gameState.roundActive = true;
    gameState.spinLocked  = false;

    showEffect('✔', '#51cf66');
    SOUNDS.correct();
    createParticles(document.getElementById('correct-btn'), '#51cf66', 12);

    // Reset per-turn escalation
    if (gameState.pendingBombTargets[gameState.activeIndex] !== undefined) {
        gameState.extraBombs = gameState.pendingBombTargets[gameState.activeIndex];
        delete gameState.pendingBombTargets[gameState.activeIndex];
    } else {
        gameState.extraBombs = 0;
    }
    gameState.bombChance    = 0;
    gameState.rareChancePct = 5;

    // Rare always on wheel; active power randomised each turn
    gameState.rareOnWheel    = true;
    gameState.activeRare     = RARE_POWERS[Math.floor(Math.random() * RARE_POWERS.length)];
    gameState.targetTeamIdx  = null;
    showRareAnnounce(gameState.activeRare);
    SOUNDS.rare();

    document.getElementById('roulette-area').classList.add('active');
    document.getElementById('prompt-box').classList.add('hidden-phase');
    document.getElementById('prompt-box').classList.remove('glow');
    document.getElementById('pot-display').innerText = '0';
    document.getElementById('bank-btn').classList.add('hidden');
    document.getElementById('spin-btn').disabled = false;

    const wheel = document.getElementById('wheel');
    wheel.style.transition = 'none';
    wheel.style.transform  = 'rotate(0deg)';
    setTimeout(() => { wheel.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.2,0.7,0.2,1)`; }, 50);

    gameState.pot = 0;
    // Draw wheel at current bomb chance (0 on first spin)
    buildWheelGradient(gameState.bombChance);
    // Update bomb scale/pulse without rebuilding gradient
    const _bv = document.getElementById('bomb-visual');
    const _sc  = 0.7 + (gameState.bombChance / 100) * 0.8;
    _bv.style.setProperty('--bomb-scale', _sc);
    _bv.classList.toggle('pulse', gameState.bombChance > 50);
    updateTargetSelection();

    const banner = document.getElementById('powerup-banner');
    if (gameState.rareOnWheel && gameState.activeRare) {
        banner.className = 'active';
        banner.innerHTML = `${gameState.activeRare.icon} <span>${gameState.activeRare.name} active — land ⭐ to activate!</span>`;
    } else {
        banner.className = '';
        banner.innerHTML = '';
    }
}

function showRareAnnounce(rare) {
    const el = document.getElementById('rare-announce');
    document.getElementById('rare-announce-icon').innerText = rare.icon;
    document.getElementById('rare-announce-text').innerText = `⭐ ${rare.name} UNLOCKED!`;
    document.getElementById('rare-announce-sub').innerText  = rare.sub;
    el.classList.add('active');
    setTimeout(() => el.classList.remove('active'), 2800);
}

let currentRotation = 0;
const SPIN_DURATION = 3200; // ms — keep in sync with CSS transition

function spinWheel() {
    if (!gameState.roundActive || gameState.spinLocked) return;
    if (gameState.activeRare?.needsTarget && gameState.targetTeamIdx === null) {
        showEffect('Pick target!', '#ff6b6b');
        return;
    }

    gameState.spinLocked = true;
    document.getElementById('spin-btn').disabled = true;

    const wheel = document.getElementById('wheel');

    // ── Snapshot slices NOW (before bomb% changes) ──────────────
    const slices = buildSlices(gameState.bombChance);
    // Display current wheel layout for the spin visual (no DOM change yet)
    applyWheelDisplay(slices, gameState.bombChance);

    // Pick result
    const rand = Math.random() * 360;
    const hit  = slices.find(s => rand >= s.start && rand < s.end) || slices[slices.length - 1];

    // Land near centre of slice (avoid edge artifacts)
    const sliceSize   = hit.end - hit.start;
    const padding     = sliceSize * 0.15;
    const targetAngle = hit.start + padding + Math.random() * (sliceSize - padding * 2);
    const finalAngle  = 360 - targetAngle;

    const spins         = 8 + Math.floor(Math.random() * 3);
    const currentNorm   = currentRotation % 360;
    const deltaToTarget = (360 - currentNorm + finalAngle) % 360;
    const totalRotation = currentRotation + spins * 360 + deltaToTarget;
    currentRotation     = totalRotation;

    wheel.classList.add('spinning');
    startTicking(SPIN_DURATION);

    wheel.style.transition = `transform ${SPIN_DURATION}ms cubic-bezier(0.2,0.7,0.2,1)`;
    wheel.style.transform  = `rotate(${totalRotation}deg)`;

    setTimeout(() => {
        stopTicking();
        wheel.classList.remove('spinning');
        SOUNDS.tick(); // final click

        // Flash pointer + landing shimmer
        flashLegendHit(hit.type);
        wheel.classList.add('land-flash');
        setTimeout(() => wheel.classList.remove('land-flash'), 600);

        // ── Delay wheel REDRAW until after result animation (800ms) ──
        // This prevents visual segment shift from confusing the player
        resolveHit(hit);
        setTimeout(() => {
            buildWheelGradient(gameState.bombChance);
            updateBombVisual(false);
        }, 800);

    }, SPIN_DURATION);
}

function resolveHit(hit) {
    if (hit.type === 'rare') { handleStarSpin(); return; }
    if (hit.type === 'bomb') { handleBomb();     return; }
    handlePoints(hit.value || 1);
}

function handlePoints(points) {
    gameState.pot += points;
    const potDisplay = document.getElementById('pot-display');
    potDisplay.innerText = gameState.pot;
    potDisplay.classList.remove('bump');
    void potDisplay.offsetWidth;
    potDisplay.classList.add('bump');

    // Bomb grows +10% per point scored, starting from 0
    gameState.bombChance = Math.min(90, gameState.bombChance + 10);

    const bombVisual = document.getElementById('bomb-visual');
    setTimeout(() => {
        bombVisual.classList.add('growing');
        setTimeout(() => bombVisual.classList.remove('growing'), 500);
    }, 350);

    // Note: wheel redraw is handled by spinWheel's 800ms delayed callback
    // Only update bomb scale/pulse here
    const scale = 0.7 + (gameState.bombChance / 100) * 0.8;
    bombVisual.style.setProperty('--bomb-scale', scale);
    bombVisual.classList.toggle('pulse', gameState.bombChance > 50);

    SOUNDS.point(points);
    showEffect(`+${points}`, '#51cf66');
    createParticles(potDisplay, '#51cf66');

    document.getElementById('bank-btn').classList.remove('hidden');
    gameState.spinLocked = false;
    document.getElementById('spin-btn').disabled = false;
}

function handleStarSpin() {
    showEffect('⭐', '#ffd43b');
    createParticles(document.getElementById('wheel-container'), '#ffd43b', 20);
    SOUNDS.rare();

    if (!gameState.activeRare) { handlePoints(2); return; }

    const rare = gameState.activeRare;

    if (rare.id === 'double') {
        if (gameState.pot === 0) gameState.pot = 1;
        gameState.pot *= 2;
        document.getElementById('pot-display').innerText = gameState.pot;
        showEffect('⚡ x2!', '#9775fa');
        document.getElementById('bank-btn').classList.remove('hidden');
        gameState.spinLocked = false;
        document.getElementById('spin-btn').disabled = false;
        return;
    }

    if (rare.id === 'plantBomb' && gameState.targetTeamIdx !== null) {
        gameState.pendingBombTargets[gameState.targetTeamIdx] = 80;
        showEffect('💣 PLANTED!', '#ff6b6b');
        document.getElementById('bank-btn').classList.remove('hidden');
        gameState.spinLocked = false;
        document.getElementById('spin-btn').disabled = false;
        renderFooter();
        return;
    }

    if (rare.id === 'shield') {
        gameState.shielded[gameState.activeIndex] = true;
        showEffect('🛡️ SHIELDED!', '#4dabf7');
        document.getElementById('bank-btn').classList.remove('hidden');
        gameState.spinLocked = false;
        document.getElementById('spin-btn').disabled = false;
        renderFooter();
        return;
    }

    handlePoints(2);
}

function handleBomb() {
    if (gameState.shielded[gameState.activeIndex]) {
        delete gameState.shielded[gameState.activeIndex];
        showEffect('🛡️ BLOCKED!', '#4dabf7');
        gameState.spinLocked = false;
        document.getElementById('spin-btn').disabled = false;
        renderFooter();
        return;
    }

    gameState.spinLocked = true;
    document.getElementById('spin-btn').disabled = true;
    document.getElementById('game-container').classList.add('shake');
    createParticles(document.getElementById('wheel-container'), '#ff6b6b', 30);
    SOUNDS.bomb();

    document.getElementById('bomb-message').innerText = `${gameState.teams[gameState.activeIndex].name} loses pot! 💫`;
    document.getElementById('bomb-overlay').classList.add('active');
    showEffect('BOOM!', '#ff6b6b');

    setTimeout(() => {
        document.getElementById('game-container').classList.remove('shake');
        document.getElementById('bomb-overlay').classList.remove('active');
        cycleTeam();
    }, 2500);
}

function bankPoints() {
    if (gameState.spinLocked) return;
    gameState.teams[gameState.activeIndex].score += gameState.pot;
    SOUNDS.bank();
    showEffect(`+${gameState.pot} ⭐`, '#ffd93d');
    createParticles(document.getElementById('pot-display'), '#ffd43b', 15);
    cycleTeam();
}

function skipTeam() {
    showEffect('SKIP', '#4dabf7');
    cycleTeam();
}

function cycleTeam() {
    gameState.roundActive  = false;
    gameState.spinLocked   = false;
    document.getElementById('roulette-area').classList.remove('active');
    document.getElementById('bank-btn').classList.add('hidden');
    document.getElementById('target-selection').classList.remove('active');
    document.getElementById('powerup-banner').className = '';

    gameState.activeIndex = (gameState.activeIndex + 1) % gameState.teams.length;
    gameState.pot         = 0;
    gameState.activeRare  = null;
    gameState.rareOnWheel = false;
    gameState.targetTeamIdx = null;

    updateUI();
    advanceQuestion();
}

/* ═══════════════════════════════════════════════════════
   FINISH SCREEN
═══════════════════════════════════════════════════════ */
function showFinishScreen() {
    gameState.gameEnded = true;
    const sorted = [...gameState.teams].sort((a, b) => b.score - a.score);
    const winner = sorted[0];
    const isTie  = sorted.filter(t => t.score === winner.score).length > 1;

    document.getElementById('finish-winner-title').innerText = isTie ? "IT'S A TIE!" : `${winner.name} WINS!`;
    document.getElementById('finish-winner-icon').innerText  = isTie ? '🤝' : '🏆';
    document.getElementById('finish-winner-score').innerText = winner.score;

    const medals = ['🥇','🥈','🥉'];
    document.getElementById('finish-rankings').innerHTML = sorted.map((team, i) =>
        `<div class="ranking-row ${i === 0 ? 'ranking-winner' : ''}">
            <span class="ranking-medal">${medals[i] ?? ''}</span>
            <span class="ranking-name">${team.name}</span>
            <span class="ranking-score">${team.score}</span>
        </div>`
    ).join('');

    document.getElementById('finish-questions').innerText = questionsAnswered;
    document.getElementById('finish-teams').innerText     = gameState.teams.length;
    document.getElementById('finish-overlay').classList.add('active');
    SOUNDS.victory();
}

function restartGame() {
    document.getElementById('finish-overlay').classList.remove('active');
    document.getElementById('start-screen').classList.remove('hidden');
}

function endGameManually() { showFinishScreen(); }

/* ═══════════════════════════════════════════════════════
   EFFECTS
═══════════════════════════════════════════════════════ */
function showEffect(text, color) {
    const overlay = document.getElementById('effects-overlay');
    const el      = document.createElement('div');
    el.className  = 'effect-text';
    el.innerText  = text;
    el.style.color = color;
    el.style.left  = `${20 + Math.random() * 60}%`;
    el.style.top   = `${20 + Math.random() * 50}%`;
    overlay.appendChild(el);
    setTimeout(() => el.remove(), 1500);
}

function createParticles(element, color, count = 8) {
    const rect    = element.getBoundingClientRect();
    const centerX = rect.left + rect.width  / 2;
    const centerY = rect.top  + rect.height / 2;
    const overlay = document.getElementById('effects-overlay');
    for (let i = 0; i < count; i++) {
        const p       = document.createElement('div');
        p.className   = 'particle';
        p.style.background = color;
        p.style.left       = `${centerX}px`;
        p.style.top        = `${centerY}px`;
        p.style.setProperty('--tx', `${(Math.random() - 0.5) * 200}px`);
        p.style.setProperty('--ty', `${(Math.random() - 0.5) * 200}px`);
        overlay.appendChild(p);
        setTimeout(() => p.remove(), 1000);
    }
}

function manualScore(idx) {
    const team     = gameState.teams[idx];
    const newScore = prompt(`New score for ${team.name}?`, team.score);
    if (newScore !== null && !isNaN(parseInt(newScore))) {
        team.score = parseInt(newScore);
        updateUI();
    }
}

/* Init wheel on load */
window.addEventListener('load', () => buildWheelGradient(0));
</script>
